<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotogram</title>
    <link rel="stylesheet" href="./css/root.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/responsive.css">
    <link rel="stylesheet" href="./links/font-face.css">
    <link rel="shortcut icon" href="./icons/camera-retro-solid-full.svg" type="image/x-icon">
</head>

<body>
    <header class="main_header">
        <a class="header_logo" href="./index.html"><img src="./icons/camera-retro-solid-full.svg" alt="page logo"><span class="logo_text">Pongauer Augenblicke</span></a>
    </header>
    <main>
        <section id="Title">
            <h1>Pongauer Augenblicke <br> <span class="deco-font">Fotografie zwischen Alpen und Tal</span></h1>
            <p>Landschaftsfotografie aus dem Salzburger Pongau – Naturaufnahmen mit Nikon,
                eingefangen zwischen Berggipfeln, Tälern und wechselndem Alpenlicht.</p>
        </section>
        <section id="Gallery">
            <div id="galleryWrapper"></div>
            <dialog id="lightbox" onclick="closeLightbox()">
                <div id="propagation_guard" onclick="event.stopPropagation()">
                    <header>
                        <button id="closeDialog" onclick="closeLightbox()">x</button>
                    </header>
                    <section>
                        <img id="lightboxImg" src="">
                    </section>
                    <footer>
                        <nav class="lightbox_pag">
                            <button class="nav_btn" id="pagStart" onclick="galleryPagStart()"><img
                                    src="./icons/angles-left-solid-full.svg" class="to_start_btn"></button>
                            <button class="nav_btn" id="pagPrev" onclick="galleryPagPrev()"><img
                                    src="./icons/angle-left-solid-full.svg" class="prev_btn"></button>
                            <p><span id="currentImg"></span> / <span id="totalImg"></span></p>
                            <button class="nav_btn" id="pagNext" onclick="galleryPagNext()"><img
                                    src="./icons/angle-right-solid-full.svg" class="next_btn"></button>
                            <button class="nav_btn" id="pagEnd" onclick="galleryPagEnd()"><img
                                    src="./icons/angles-right-solid-full.svg" class="to_end_btn"></button>
                        </nav>
                    </footer>
                </div>
            </dialog>
        </section>
    </main>
    <footer class="main_footer">
        <nav class="footer_nav">
            <ul>
                <li><a href="./pages/impressum.html">Impressum</a></li>
                <li><a href="./pages/datenschutz.html">Datenschutz</a></li>
            </ul>
        </nav>
        <p class="copyright">© 2026 - Dalibor Durbas - Boriel Designs</p>
    </footer>
</body>
<script src="./js/script.js"></script>
<script src="./js/gallery.js"></script>

</html>
